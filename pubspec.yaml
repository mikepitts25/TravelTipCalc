name: travel_tip_calc
description: A modern travel tip calculator for 200+ countries.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.2
  path: ^1.9.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_mobile_ads: ^8.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  http: ^1.2.1
  go_router: ^14.2.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  flutter_lints: ^4.0.0

flutter:
  config:
    enable-swift-package-manager: true

  uses-material-design: true
  assets:
    - assets/data/
